<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IFG Sales Dashboard</title>
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
--bg: #0f1117;
--surface: #181c27;
--surface2: #1e2333;
--border: #2a2f42;
--accent: #4f7fff;
--accent2: #7c3aed;
--green: #22c55e;
--amber: #f59e0b;
--red: #ef4444;
--text: #e8eaf0;
--muted: #6b7280;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
/* LOGIN */
#login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #0f1117 0%, #1a1f35 50%, #0f1117 100%); }
.login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 48px; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
.login-logo { width: 64px; height: 64px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 28px; font-weight: 700; color: white; }
.login-card h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
.login-card p { color: var(--muted); margin-bottom: 32px; font-size: 14px; }
.btn-login { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 14px 24px; background: var(--accent); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
.btn-login:hover { background: #3d6ef0; transform: translateY(-1px); }
.login-error { color: #fca5a5; font-size: 13px; margin-top: 16px; display: none; }
/* APP */
#app { display: none; }
/* HEADER */
.header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
.header-left { display: flex; align-items: center; gap: 12px; }
.logo-small { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: white; }
.header h2 { font-size: 16px; font-weight: 600; }
.header-right { display: flex; align-items: center; gap: 12px; }
.user-badge { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: 13px; }
.user-avatar { width: 26px; height: 26px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: white; }
.role-pill { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
.role-Beheerder { background: rgba(79,127,255,0.15); color: var(--accent); }
.role-BM { background: rgba(124,58,237,0.15); color: #a78bfa; }
.role-TM { background: rgba(34,197,94,0.15); color: var(--green); }
.role-Recruiter { background: rgba(245,158,11,0.15); color: var(--amber); }
.btn-refresh { display: flex; align-items: center; gap: 6px; padding: 6px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
.btn-refresh:hover { border-color: var(--accent); color: var(--accent); }
.btn-logout { padding: 6px 14px; background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
.btn-logout:hover { border-color: var(--red); color: var(--red); }
/* FILTERS */
.filters { display: flex; align-items: center; gap: 12px; padding: 14px 24px; background: var(--surface); border-bottom: 1px solid var(--border); }
.filter-label { color: var(--muted); font-size: 13px; }
.filter-btn { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
.filter-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }
.sync-time { margin-left: auto; color: var(--muted); font-size: 12px; font-family: 'DM Mono', monospace; }
/* CONTENT */
.content { padding: 24px; display: flex; flex-direction: column; gap: 24px; }
/* SECTION */
.section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.section-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
.section-header:hover { background: var(--surface2); }
.section-title { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 600; }
.section-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.icon-aanvragen { background: rgba(79,127,255,0.15); }
.icon-plaatsingen { background: rgba(34,197,94,0.15); }
.icon-beschikbaarheid { background: rgba(245,158,11,0.15); }
.section-count { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 2px 10px; font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
.section-chevron { color: var(--muted); font-size: 12px; transition: transform 0.2s; }
.section-chevron.open { transform: rotate(180deg); }
.section-body { display: none; }
.section-body.open { display: block; }
/* TABLE */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 10px 16px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); background: var(--surface2); border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }
/* PIPELINE */
.pipeline { display: flex; gap: 6px; flex-wrap: wrap; }
.pip { display: flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.pip:hover { opacity: 0.8; transform: scale(1.05); }
.pip-voorstel { background: rgba(79,127,255,0.15); color: #7ba7ff; }
.pip-gesprek { background: rgba(245,158,11,0.15); color: #fbbf24; }
.pip-zero { background: var(--surface2); color: var(--muted); cursor: default; }
.pip-zero:hover { transform: none; }
/* BADGES */
.status-badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; }
.status-exclusief { background: rgba(124,58,237,0.15); color: #a78bfa; }
.status-niet { background: rgba(148,163,184,0.15); color: #94a3b8; }
.status-beschikbaar { background: rgba(34,197,94,0.15); color: #4ade80; }
.status-binnenkort { background: rgba(245,158,11,0.15); color: #fbbf24; }
.badge-deta { background: rgba(34,197,94,0.15); color: #4ade80; }
.badge-zzp { background: rgba(79,127,255,0.15); color: #7ba7ff; }
.badge-ws { background: rgba(245,158,11,0.15); color: #fbbf24; }
.badge-other { background: var(--surface2); color: var(--muted); }
.badge-proc-vast { background: rgba(34,197,94,0.15); color: #4ade80; }
.badge-proc-interim { background: rgba(245,158,11,0.15); color: #fbbf24; }
.badge-proc-beide { background: rgba(79,127,255,0.15); color: #7ba7ff; }
.badge-proc-ifg { background: rgba(124,58,237,0.15); color: #a78bfa; }
.badge-proc-other { background: var(--surface2); color: var(--muted); }
/* BESCHIKBAARHEID ALERT */
.geen-voorstellen td:first-child { border-left: 3px solid var(--red); }
.alert-dot { display: inline-block; width: 7px; height: 7px; background: var(--red); border-radius: 50%; margin-right: 6px; animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
/* LOADING / EMPTY */
.loading { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 48px; color: var(--muted); }
.spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { padding: 40px; text-align: center; color: var(--muted); }
/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; max-width: 480px; width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: 0 24px 64px rgba(0,0,0,0.6); }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.modal-title { font-size: 16px; font-weight: 600; }
.modal-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }
.modal-close:hover { color: var(--text); }
.modal-item { display: flex; flex-direction: column; gap: 4px; padding: 12px; background: var(--surface2); border-radius: 8px; margin-bottom: 8px; }
.modal-item-name { font-weight: 500; font-size: 14px; }
.modal-item-meta { color: var(--muted); font-size: 12px; }
.modal-item-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); }
/* ERROR */
.error-banner { display: none; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 8px; padding: 12px 16px; color: #fca5a5; font-size: 13px; margin: 16px 24px 0; }
/* MEETINGS */
.icon-meetings { background: rgba(124,58,237,0.15); }
.icon-gesprekken { background: rgba(13,148,136,0.18); }
.mbar { display:flex; align-items:center; gap:8px; padding:12px 16px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
.mbar-group { display:flex; gap:6px; }
.mbar-sep { width:1px; height:22px; background:var(--border); margin:0 4px; }
.mtab { padding:5px 12px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--muted); font-size:12px; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all .15s; }
.mtab.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.mtab:hover:not(.active) { border-color:var(--accent); color:var(--accent); }
.mtype { background: rgba(124,58,237,0.15); color:#a78bfa; }
.mres { background: rgba(34,197,94,0.15); color:#4ade80; }
</style>
</head>
<body>
<div id="login-screen">
<div class="login-card">
<div class="login-logo">IF</div>
<h1>IFG Sales Dashboard</h1>
<p>Log in met je Interim Finance Group account om verder te gaan.</p>
<button class="btn-login" onclick="login()">
<svg width="18" height="18" viewBox="0 0 21 21" fill="none"><path d="M10 0H0v10h10V0z" fill="#f25022"/><path d="M21 0H11v10h10V0z" fill="#7fba00"/><path d="M10 11H0v10h10V11z" fill="#00a4ef"/><path d="M21 11H11v10h10V11z" fill="#ffb900"/></svg>
Inloggen met Microsoft
</button>
<div class="login-error" id="login-error"></div>
</div>
</div>

<div id="app">
<div class="header">
<div class="header-left">
<div class="logo-small">IF</div>
<h2>IFG Sales Dashboard</h2>
</div>
<div class="header-right">
<div class="user-badge">
<div class="user-avatar" id="user-initials">--</div>
<span id="user-name">--</span>
<span class="role-pill" id="user-role-badge"></span>
</div>
<button class="btn-refresh" onclick="loadAllData()">
<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
Vernieuwen
</button>

</div>
</div>

<div class="filters" id="filters-bar">
<span class="filter-label">Weergave:</span>
<button class="filter-btn active" id="filter-all" onclick="setFilter('all')">Heel team</button>
<button class="filter-btn" id="filter-ifg" onclick="setFilter('Interim Finance Group')">Interim Finance Group</button>
<button class="filter-btn" id="filter-search" onclick="setFilter('IFG Search')">IFG Search</button>
<select id="filter-employee" onchange="setEmployee(this.value)" style="display:none;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer"></select>
<span class="sync-time" id="sync-time"></span>
</div>

<div class="filters" id="blocknav-bar" style="border-top:none;padding-top:0">
<span class="filter-label">Toon:</span>
<button class="filter-btn active" id="block-alles" onclick="setBlock('alles')">Alles</button>
<button class="filter-btn" id="block-aanvragen" onclick="setBlock('aanvragen')">Aanvragen</button>
<button class="filter-btn" id="block-plaatsingen" onclick="setBlock('plaatsingen')">Plaatsingen</button>
<button class="filter-btn" id="block-beschikbaarheid" onclick="setBlock('beschikbaarheid')">Beschikbaarheid</button>
<button class="filter-btn" id="block-meetings" onclick="setBlock('meetings')">Afspraken</button>
<button class="filter-btn" id="block-gesprekken" onclick="setBlock('gesprekken')">Gesprekken</button>

<div class="content">

<span class="section-chevron open" id="chevron-plaatsingen">▼</span>
</div>
<div class="section-body open" id="body-plaatsingen"><div class="loading"><div class="spinner"></div>Laden...</div></div>
</div>

<div class="section-header" onclick="toggleSection('beschikbaarheid')">
<div class="section-title"><div class="section-icon icon-beschikbaarheid">👥</div>Beschikbaarheid<span class="section-count" id="count-beschikbaarheid">0</span></div>
<span class="section-chevron open" id="chevron-beschikbaarheid">▼</span>
</div>

</div>

<div class="section-header" onclick="toggleSection('meetings')">
<div class="section-title"><div class="section-icon icon-meetings">🗓️</div>Afspraken<span class="section-count" id="count-meetings">0</span></div>
<span class="section-chevron open" id="chevron-meetings">▼</span>

</div>

<div class="section" id="section-gesprekken">

<div class="section-title"><div class="section-icon icon-gesprekken">🤝</div>Op gesprek bij klant<span class="section-count" id="count-gesprekken">0</span></div>
<span class="section-chevron open" id="chevron-gesprekken">▼</span>
</div>

</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
<div class="modal">
<div class="modal-header">
<div class="modal-title" id="modal-title"></div>
<button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">✕</button>
</div>
<div id="modal-body"></div>
</div>
</div>

<script>
const CLIENT_ID = '3b7f8ed0-6783-4245-a081-4951e674ac65';
const TENANT_ID = 'd7ae35d9-f564-4463-828d-261f3e332eac';
const SP_SITE = 'https://interimfinancegroup.sharepoint.com/sites/IFGSalesdashboard';
const SP_API = SP_SITE + '/_api/web/lists/getbytitle';
const SCOPES = ['https://interimfinancegroup.sharepoint.com/AllSites.Read'];

const msalConfig = {
auth: { clientId: CLIENT_ID, authority: 'https://login.microsoftonline.com/' + TENANT_ID, redirectUri: 'https://dashboard-ifg.github.io/ifg-dashboard/' },
cache: { cacheLocation: 'sessionStorage', storeAuthStateInCookie: true }
};
const msalInstance = new msal.PublicClientApplication(msalConfig);

// Granulaire dashboardrol per CarerixID. Dient als terugval zolang gebruikers in Carerix
// nog op 'Sales' staan (niet gekoppeld aan Business/Talent Manager). Zodra ze in Carerix
// aan de juiste rol hangen, wint die rol automatisch via de SP-kolom Rol.
const GEBRUIKERS_MAP = {
'1': { naam: 'Jan Hessing', rol: 'Beheerder', vestiging: 'Interim Finance Group' },
'10019': { naam: 'Akeo Kuipers', rol: 'Beheerder', vestiging: 'Interim Finance Group' },
'8': { naam: 'Tom Heuvels', rol: 'Business Manager', vestiging: 'Interim Finance Group' },
'4285': { naam: 'Kjell van den Bosch', rol: 'Business Manager', vestiging: 'Interim Finance Group' },
'9949': { naam: 'Jan-Willem de Kool', rol: 'Business Manager', vestiging: 'Interim Finance Group' },
'4286': { naam: 'Mirjam Doornbos', rol: 'Business Manager', vestiging: 'Interim Finance Group' },
'1465': { naam: 'Joette Vlam', rol: 'Talent Manager', vestiging: 'Interim Finance Group' },
'2987': { naam: 'Sandrine Timmerman', rol: 'Talent Manager', vestiging: 'Interim Finance Group' },
'10043': { naam: "Bo van 't Schip", rol: 'Recruiter', vestiging: 'IFG Search' },
'413': { naam: 'Moos Azadmanesh', rol: 'Recruiter', vestiging: 'IFG Search' }
};

// Match status IDs uit Carerix
const STATUS_VOORSTEL = ['1055'];        // 3.3 Voorstel op aanvraag
const STATUS_GESPREK = ['7', '8'];       // 4.0 1e gesprek + 4.1 Vervolg gesprek (ALLEEN externe gesprekken; 1014/1016 intern tellen NIET mee)
const STATUS_PLAATSING_ACTIEF = ['35', '37', '13'];

let currentUser = null;
let currentRole = null;
let currentUserId = null;       // CarerixID van de ingelogde gebruiker (uit IFG_Gebruikers op Email)
let currentVestiging = '';      // vestiging van de ingelogde gebruiker
let currentFilter = 'all';
let currentEmployee = null;     // CarerixID waarop een Beheerder inzoomt; null = alle medewerkers
let aanvragenScope = 'team';    // Aanvragen-blok: 'individueel' | 'team' | 'bedrijf' (voor iedereen)
let activeBlock = 'alles';      // welk blok bovenaan getoond wordt; 'alles' = allemaal
let userMap = {};               // CarerixID -> { naam, email, rol, vestiging } — gevuld uit IFG_Gebruikers
let allData = { aanvragen: [], plaatsingen: [], beschikbaarheid: [], meetings: [] };
let meetingsView = 'komende';   // 'komende' | 'afgelopen'
let meetingsPeriod = 'maand';   // 'week' | 'maand' | 'kwartaal'
let meetingsSort = { key: null, dir: null };  // null = standaard (datum volgens weergave)
let meetingsTypes = [];          // geselecteerde afspraaktypes; leeg = alle (binnen MEETING_TYPES)
let meetingsTypeOpts = [];       // beschikbare type-knoppen
// Afspraaktypes waarop het meetings-blok focust (overige types zijn voor het activity-dashboard).
const MEETING_TYPES = ['Acquisitie - NB', 'Relatiebeheer - BB', 'Kandidaat screening'];

// ─── AUTH ─────────────────────────────────────────────────────────────────────
async function login() {
try {
await msalInstance.loginRedirect({ scopes: SCOPES });
} catch(e) {
const el = document.getElementById('login-error');
el.textContent = 'Inloggen mislukt: ' + (e.message || e);
el.style.display = 'block';
}
}
async function logout() {
try { await msalInstance.logoutRedirect({ postLogoutRedirectUri: 'https://dashboard-ifg.github.io/ifg-dashboard/' }); } catch(e) {}
}
async function getToken() {
const account = msalInstance.getActiveAccount();
const resp = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account });
return resp.accessToken;
}

// ─── GEBRUIKERS / ROL ───────────────────────────────────────────────────────────
function staticToMap() {
const m = {};
for (const [id, u] of Object.entries(GEBRUIKERS_MAP)) {
m[id] = { naam: u.naam, email: '', rol: u.rol, vestiging: u.vestiging };
}
return m;
}

// Leest het e-mailadres robuust uit een SP-rij. SharePoint kan een kolom 'Email'
// intern hernoemen naar EMail / Email0 / e_mail, daarom proberen we varianten
// én vallen we terug op elke key die op 'mail' lijkt of een waarde met '@'.
function leesEmailVeld(r) {
const kandidaten = ['Email', 'EMail', 'Email0', 'eMail', 'E_mail', 'emailAddress', 'Mail'];
for (const k of kandidaten) {
if (r[k] != null && String(r[k]).trim() !== '') return String(r[k]).trim();
}
for (const [k, v] of Object.entries(r)) {
if (/mail/i.test(k) && v != null && String(v).includes('@')) return String(v).trim();
}
for (const v of Object.values(r)) {
if (typeof v === 'string' && v.includes('@') && v.includes('.')) return v.trim();
}
return '';
}

// Laadt IFG_Gebruikers uit SharePoint en bouwt userMap (CarerixID -> rol/email/vestiging).
// Valt terug op de statische map als de lijst leeg/onbereikbaar is.
async function loadGebruikers() {
try {
const rows = await spGet('IFG_Gebruikers');
const m = {};
rows.forEach(r => {
const id = String(r.CarerixID || '').trim();
if (!id) return;
m[id] = {
naam: ((r.Voornaam || '') + ' ' + (r.Achternaam || '')).trim(),
email: leesEmailVeld(r),
rol: r.Rol || '',
vestiging: r.Vestiging || ''
};
});
userMap = Object.keys(m).length ? m : staticToMap();
} catch(e) {
userMap = staticToMap();
}
}

function normaliseerRol(r) {
const s = (r || '').toLowerCase();
if (s.includes('beheerder')) return 'Beheerder';
if (s.includes('business')) return 'Business Manager';
if (s.includes('talent')) return 'Talent Manager';
if (s.includes('recruit')) return 'Recruiter';
return 'Business Manager';
}

// Carerix levert granulaire rollen (Beheerder/Business Manager/Talent Manager) ZODRA
// een gebruiker eraan gekoppeld is. 'Sales' (Sales & Recruitment) = recruiter, en is
// ook de waarde voor nog-niet-gekoppelde gebruikers. Daarom: granulaire Carerix-rol wint;
// bij 'Sales'/leeg vallen we terug op de code-map (transitie), anders Recruiter.
function isGranulareRol(r) {
const s = (r || '').toLowerCase();
return s.includes('beheerder') || s.includes('business') || s.includes('talent') || s.includes('recruit');
}
function rolUitSpEnMap(spRol, carerixId) {
if (isGranulareRol(spRol)) return normaliseerRol(spRol);
const vast = GEBRUIKERS_MAP[String(carerixId)];
if (vast) return normaliseerRol(vast.rol);
return 'Recruiter';
}

// Best-effort match op e-mail tegen de statische map (alleen fallback).
function matchStatischOpEmail(email) {
const local = (email.split('@')[0] || '').toLowerCase();
for (const [id, u] of Object.entries(GEBRUIKERS_MAP)) {
const parts = u.naam.toLowerCase().replace(/'/g, '').split(' ');
const first = parts[0] || '';
const last = parts[parts.length - 1] || '';
const patterns = [
first[0] + '.' + last,   // j.hessing
first + '.' + last,      // jan.hessing
first[0] + last          // jhessing
];
if (patterns.includes(local) || (last && local.includes(last))) {
return { id, ...u };
}
}
return null;
}

function bepaalRolEnId(email) {
// 1) Identiteit via Email-kolom uit IFG_Gebruikers. Rol: granulaire Carerix-rol wint;
//    bij 'Sales'/leeg terugval op code-map (transitie + recruiters).
for (const [id, u] of Object.entries(userMap)) {
if (u.email && u.email.toLowerCase() === email) {
const rol = rolUitSpEnMap(u.rol, id);
const vast = GEBRUIKERS_MAP[String(id)];
const vestiging = u.vestiging || (vast ? vast.vestiging : '') || '';
const bron = isGranulareRol(u.rol)
? ('Carerix-rol via SP (' + u.rol + ')')
: (vast ? ('Carerix=Sales -> rolmap (CarerixID ' + id + ')') : 'Carerix=Sales -> standaard Recruiter');
return { rol, id: String(id), vestiging, bron };
}
}
// 2) Fallback: statische map op e-mailpatroon
const m = matchStatischOpEmail(email);
if (m) return { rol: normaliseerRol(m.rol), id: String(m.id), vestiging: m.vestiging || '', bron: 'statische fallback (e-mailpatroon)' };
// 3) Laatste redmiddel
return { rol: 'Business Manager', id: null, vestiging: 'Interim Finance Group', bron: 'geen match — standaard BM' };
}

async function spGet(list) {
const token = await getToken();
const url = SP_API + "('" + list + "')/items?$top=500";
const resp = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/json;odata=nometadata' } });
if (!resp.ok) throw new Error('SP fout ' + resp.status + ' voor ' + list);
return (await resp.json()).value || [];
}

currentEmployee = id || null;
renderAll();
}

function filterItems(items, ownerField) {
// Beheerder die op één medewerker inzoomt: alleen die persoon (geldt voor álle blokken).
if (currentEmployee) return items.filter(i => String(i[ownerField]) === String(currentEmployee));
if (currentRole === 'Beheerder') {
if (currentFilter === 'all') return items;
return items.filter(i => {
const u = userMap[String(i[ownerField])] || GEBRUIKERS_MAP[String(i[ownerField])];
return u && u.vestiging === currentFilter;
});
}
// Niet-beheerder: eigen records + team (= dezelfde vestiging).
return items.filter(i => {
if (currentUserId && String(i[ownerField]) === String(currentUserId)) return true;
const u = userMap[String(i[ownerField])] || GEBRUIKERS_MAP[String(i[ownerField])];
return u && currentVestiging && u.vestiging === currentVestiging;
});
}

// Aanvragen heeft een eigen 3-standen-scope voor iedereen (individueel/team/bedrijf).
// Een ingezoomde medewerker (Beheerder) heeft altijd voorrang.
function filterAanvragen(items) {
if (currentEmployee) return items.filter(i => String(i.OwnerID) === String(currentEmployee));
if (aanvragenScope === 'bedrijf') return items;
if (aanvragenScope === 'individueel') return currentUserId ? items.filter(i => String(i.OwnerID) === String(currentUserId)) : items;
// team = dezelfde vestiging
return items.filter(i => {
if (currentUserId && String(i.OwnerID) === String(currentUserId)) return true;
const u = userMap[String(i.OwnerID)] || GEBRUIKERS_MAP[String(i.OwnerID)];
return u && currentVestiging && u.vestiging === currentVestiging;
});
}
function setAanvragenScope(s) { aanvragenScope = s; renderAanvragen(); }

function statusIs(k, ids) {

}

function getVoorstellenGesprekken(kandidaten) {

}

aanvraag: matches.filter(k => statusIs(k, ['1055'])),

netwerk: matches.filter(k => statusIs(k, ['6'])),

function contractBadge(raw) {

if (s.includes('deta')) return '<span class="status-badge badge-deta">DETA</span>';
if (s.includes('zzp')) return '<span class="status-badge badge-zzp">ZZP</span>';

return '<span class="status-badge badge-other">' + esc(raw) + '</span>';
}

function procedureBadge(raw) {
const v = (raw || '').trim();
if (!v) return '<span style="color:var(--muted)">—</span>';

let cls = 'badge-proc-other';
if (s.includes('vast')) cls = 'badge-proc-vast';
else if (s.includes('interim')) cls = 'badge-proc-interim';

function pipBtn(type, count, title, items) {

try { return new Date(d).toLocaleDateString('nl-NL', {day:'2-digit',month:'2-digit',year:'numeric'}); } catch(e) { return d; }
}

function esc(s) {
return (s||'-').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderAll() { renderAanvragen(); renderPlaatsingen(); renderBeschikbaarheid(); renderMeetings(); renderGesprekken(); }

let gesprekkenSort = { key: 'kandidaat', dir: 'asc' };
function setGesprekkenSort(k) {
if (gesprekkenSort.key === k) gesprekkenSort.dir = gesprekkenSort.dir === 'asc' ? 'desc' : 'asc';
else { gesprekkenSort.key = k; gesprekkenSort.dir = 'asc'; }
renderGesprekken();
}
// Kandidaten in een gespreksfase (4.0 / 4.1 / 4.4) uit de aanvragen: naam, klant, vacature, fase.
// Gespreksdatum komt uit de afspraken (types "1e gesprek/Vervolg gesprek kandidaat bij klant"),
// gekoppeld op kandidaat-ID (naam als terugval).
function renderGesprekken() {
const body = document.getElementById('body-gesprekken');
const faseLabel = { '7': '4.0 · 1e gesprek', '8': '4.1 · Vervolg gesprek', '34': '4.4 · Job offer' };
const interviewTypes = { '1e gesprek kandidaat bij klant': '7', 'Vervolg gesprek kandidaat bij klant': '8' };

// Interviewafspraken indexeren per kandidaat (ID én naam).
const perKandidaat = {};
(allData.meetings || []).forEach(m => {
const t = (m.TypeAfspraak || '').trim();
if (!(t in interviewTypes)) return;
const entry = { d: parseNL(m.Start), start: m.Start, fase: interviewTypes[t] };
const idKey = String(m.KandidaatID || '').trim();
const naamKey = (m.Kandidaat || '').toLowerCase().trim();
if (idKey) (perKandidaat['id:' + idKey] = perKandidaat['id:' + idKey] || []).push(entry);
if (naamKey) (perKandidaat['naam:' + naamKey] = perKandidaat['naam:' + naamKey] || []).push(entry);
});
const vindGesprek = (kandId, kandNaam, fase) => {
const lijst = perKandidaat['id:' + String(kandId || '').trim()] || perKandidaat['naam:' + (kandNaam || '').toLowerCase().trim()] || [];
if (!lijst.length) return null;
const zelfdeFase = lijst.filter(x => x.fase === fase);
const keuze = (zelfdeFase.length ? zelfdeFase : lijst).slice().sort((a,b) => (b.d ? b.d.getTime() : 0) - (a.d ? a.d.getTime() : 0));
return keuze[0] ? keuze[0].start : null;
};

const rows = [];
filterItems(allData.aanvragen, 'OwnerID').forEach(a => {
parseJSON(a.KandidatenJSON).forEach(k => {
const sid = k.statusInfo && String(k.statusInfo._id);
if (sid === '7' || sid === '8' || sid === '34') {
const kandId = k.toEmployee && k.toEmployee._id ? String(k.toEmployee._id) : '';
const naam = kandidaatNaam(k);
rows.push({ kandidaat: naam, klant: a.Opdrachtgever || '', vacature: a.Vacature || '', procedure: procVal(a), fase: sid, consultant: a.Owner || '', gesprek: vindGesprek(kandId, naam, sid) });
}
});
});
document.getElementById('count-gesprekken').textContent = rows.length;
if (!rows.length) { body.innerHTML = '<div class="empty">Geen kandidaten in een gespreksfase.</div>'; return; }
const sk = gesprekkenSort.key, dir = gesprekkenSort.dir === 'desc' ? -1 : 1;
const sv = (r) => sk === 'fase' ? r.fase : sk === 'gesprek' ? (parseNL(r.gesprek) ? parseNL(r.gesprek).getTime() : 0) : (r[sk] || '').toLowerCase();
rows.sort((a,b) => { const va = sv(a), vb = sv(b); return va < vb ? -dir : va > vb ? dir : 0; });
const pijl = (k) => gesprekkenSort.key === k ? '<span style="opacity:.65">' + (gesprekkenSort.dir === 'desc' ? ' ↓' : ' ↑') + '</span>' : '';
const th = (k, l) => '<th onclick="setGesprekkenSort(\'' + k + '\')" style="cursor:pointer;user-select:none">' + l + pijl(k) + '</th>';
const head = '<tr>' + th('kandidaat','Kandidaat') + th('klant','Klant') + th('vacature','Vacature') + th('procedure','Procedure') + th('fase','Fase') + th('gesprek','Gesprek op') + th('consultant','Consultant') + '</tr>';
const mut = '<span style="color:var(--muted)">—</span>';
const trs = rows.map(r =>
'<tr>' +
'<td><strong>' + esc(r.kandidaat) + '</strong></td>' +
'<td>' + (r.klant ? esc(r.klant) : mut) + '</td>' +
'<td>' + (r.vacature ? esc(r.vacature) : mut) + '</td>' +
'<td>' + procedureBadge(r.procedure) + '</td>' +
'<td><span class="status-badge mtype">' + esc(faseLabel[r.fase] || r.fase) + '</span></td>' +
'<td>' + (r.gesprek ? '<span style="font-family:\'DM Mono\',monospace;font-size:12px;white-space:nowrap">' + esc(r.gesprek) + '</span>' : mut) + '</td>' +
'<td>' + (r.consultant ? esc(r.consultant) : mut) + '</td>' +
'</tr>'
).join('');
body.innerHTML = '<div class="table-wrap"><table><thead>' + head + '</thead><tbody>' + trs + '</tbody></table></div>';
}

function telStatus(json, ids) {
return parseJSON(json).filter(k => statusIs(k, ids)).length;
}

let aanvragenSort = { col: null, dir: 1 };
function sortAanvragen(col) {
aanvragenSort.col === col ? aanvragenSort.dir *= -1 : (aanvragenSort.col = col, aanvragenSort.dir = 1);
renderAanvragen();
}
function renderAanvragen() {
const body = document.getElementById('body-aanvragen');
let items = filterAanvragen(allData.aanvragen);
document.getElementById('count-aanvragen').textContent = items.length;
const scopes = [['individueel','Individueel'],['team','Team'],['bedrijf','Heel bedrijf']];
const bar = currentEmployee ? '' : '<div class="mbar"><div class="mbar-group">' +
scopes.map(s => '<button class="mtab' + (aanvragenScope===s[0]?' active':'') + '" onclick="setAanvragenScope(\'' + s[0] + '\')">' + s[1] + '</button>').join('') +
'</div></div>';
if (!items.length) { body.innerHTML = bar + '<div class="empty">Geen aanvragen gevonden.</div>'; return; }

// Sorteren
if (aanvragenSort.col) {
items = [...items].sort((a, b) => {
let va = '', vb = '';
if (aanvragenSort.col === 'vacature') { va = a.Vacature || ''; vb = b.Vacature || ''; }
else if (aanvragenSort.col === 'opdrachtgever') { va = a.Opdrachtgever || ''; vb = b.Opdrachtgever || ''; }
else if (aanvragenSort.col === 'type') { va = a.AanvraagType || ''; vb = b.AanvraagType || ''; }
else if (aanvragenSort.col === 'procedure') { va = procVal(a); vb = procVal(b); }
else if (aanvragenSort.col === 'consultant') { va = a.Owner || ''; vb = b.Owner || ''; }
else if (aanvragenSort.col === 'voorstel') { va = telStatus(a.KandidatenJSON, ['1055']); vb = telStatus(b.KandidatenJSON, ['1055']); }
else if (aanvragenSort.col === 'gesprek1') { va = telStatus(a.KandidatenJSON, ['7']); vb = telStatus(b.KandidatenJSON, ['7']); }
else if (aanvragenSort.col === 'gesprek2') { va = telStatus(a.KandidatenJSON, ['8']); vb = telStatus(b.KandidatenJSON, ['8']); }
else if (aanvragenSort.col === 'joboffer') { va = telStatus(a.KandidatenJSON, ['34']); vb = telStatus(b.KandidatenJSON, ['34']); }
return va < vb ? -aanvragenSort.dir : va > vb ? aanvragenSort.dir : 0;
});
}

const si = (col) => aanvragenSort.col !== col ? ' <span style="opacity:0.3">↕</span>' : aanvragenSort.dir === 1 ? ' <span style="color:var(--accent)">↑</span>' : ' <span style="color:var(--accent)">↓</span>';
const th = 'cursor:pointer;user-select:none;';
const pipC = (icon, cls, count, title, items) => {
if (!count) return '<span class="pip pip-zero">' + icon + ' 0</span>';
return '<span class="pip ' + cls + '" onclick=\'showModal(' + JSON.stringify(title) + ',' + JSON.stringify(items) + ')\'>' + icon + ' ' + count + '</span>';
};
body.innerHTML = bar + '<div class="table-wrap"><table><thead><tr>' +
'<th style="' + th + '" onclick="sortAanvragen(\'vacature\')">Vacature' + si('vacature') + '</th>' +
'<th style="' + th + '" onclick="sortAanvragen(\'opdrachtgever\')">Opdrachtgever' + si('opdrachtgever') + '</th>' +

'<td>' + pipC('🗓', 'pip-gesprek', pip.gesprek1.length, '1e gesprek — ' + a.Vacature, pip.gesprek1) + '</td>' +
'<td>' + pipC('🗓', 'pip-gesprek', pip.gesprek2.length, 'Vervolg gesprek — ' + a.Vacature, pip.gesprek2) + '</td>' +
'<td>' + pipC('🤝', 'pip-voorstel', pip.joboffer.length, 'Job offer — ' + a.Vacature, pip.joboffer) + '</td>' +
'</tr>';
}).join('') + '</tbody></table></div>';
}

// Plaatsingen sort state
let plaatsingenSort = { col: null, dir: 1 };
function sortPlaatsingen(col) {
if (plaatsingenSort.col === col) {
plaatsingenSort.dir *= -1;
} else {
plaatsingenSort.col = col;
plaatsingenSort.dir = 1;
}
renderPlaatsingen();
}
function renderPlaatsingen() {
const body = document.getElementById('body-plaatsingen');
if (currentRole === 'Talent Manager') {
document.getElementById('count-plaatsingen').textContent = '—';
body.innerHTML = '<div class="empty">Plaatsingen zijn niet zichtbaar voor Talent Managers.</div>'; return;
}
let items = filterItems(allData.plaatsingen, 'OwnerID');
document.getElementById('count-plaatsingen').textContent = items.length;
if (!items.length) { body.innerHTML = '<div class="empty">Geen actieve plaatsingen gevonden.</div>'; return; }

// Sorteren
if (plaatsingenSort.col) {
items = [...items].sort((a, b) => {
let va = '', vb = '';
if (plaatsingenSort.col === 'contract') { va = a.Contract || ''; vb = b.Contract || ''; }
else if (plaatsingenSort.col === 'einde') { va = a.VerwachteEinddatum || '9999'; vb = b.VerwachteEinddatum || '9999'; }
else if (plaatsingenSort.col === 'start') { va = a.Startdatum || ''; vb = b.Startdatum || ''; }
else if (plaatsingenSort.col === 'kandidaat') { va = a.Kandidaat || ''; vb = b.Kandidaat || ''; }
else if (plaatsingenSort.col === 'consultant') { va = a.Owner || ''; vb = b.Owner || ''; }
else if (plaatsingenSort.col === 'opdrachtgever') { va = a.Opdrachtgever || ''; vb = b.Opdrachtgever || ''; }
return va < vb ? -plaatsingenSort.dir : va > vb ? plaatsingenSort.dir : 0;
});
}

const sortIcon = (col) => {
if (plaatsingenSort.col !== col) return ' <span style="opacity:0.3">↕</span>';
return plaatsingenSort.dir === 1 ? ' <span style="color:var(--accent)">↑</span>' : ' <span style="color:var(--accent)">↓</span>';
};
const thStyle = 'cursor:pointer;user-select:none;';
body.innerHTML = '<div class="table-wrap"><table><thead><tr>' +
'<th style="' + thStyle + '" onclick="sortPlaatsingen(\'kandidaat\')">Kandidaat' + sortIcon('kandidaat') + '</th>' +
'<th>Vacature</th>' +
'<th style="' + thStyle + '" onclick="sortPlaatsingen(\'opdrachtgever\')">Opdrachtgever' + sortIcon('opdrachtgever') + '</th>' +
'<th style="' + thStyle + '" onclick="sortPlaatsingen(\'contract\')">Contract' + sortIcon('contract') + '</th>' +
'<th style="' + thStyle + '" onclick="sortPlaatsingen(\'consultant\')">Consultant' + sortIcon('consultant') + '</th>' +
'<th style="' + thStyle + '" onclick="sortPlaatsingen(\'start\')">Start' + sortIcon('start') + '</th>' +
'<th style="' + thStyle + '" onclick="sortPlaatsingen(\'einde\')">Einde' + sortIcon('einde') + '</th>' +
'</tr></thead><tbody>' +
items.map(p => '<tr>' +
'<td><strong>' + esc(p.Kandidaat) + '</strong></td>' +
'<td>' + esc(p.Vacature) + '</td>' +
'<td>' + esc(p.Opdrachtgever) + '</td>' +
'<td>' + contractBadge(p.Contract) + '</td>' +
'<td>' + esc(p.Owner) + '</td>' +
'<td style="font-family:\'DM Mono\',monospace;font-size:12px">' + (fmtDate(p.Startdatum) || '<span style="color:var(--muted)">—</span>') + '</td>' +
'<td style="font-family:\'DM Mono\',monospace;font-size:12px">' + (fmtDate(p.VerwachteEinddatum) || '<span style="color:var(--muted)">—</span>') + '</td>' +
'</tr>').join('') + '</tbody></table></div>';
}

let beschikbaarheidSort = { col: null, dir: 1 };
function sortBeschikbaarheid(col) {
beschikbaarheidSort.col === col ? beschikbaarheidSort.dir *= -1 : (beschikbaarheidSort.col = col, beschikbaarheidSort.dir = 1);
renderBeschikbaarheid();
}
function renderBeschikbaarheid() {
const body = document.getElementById('body-beschikbaarheid');
let items = currentRole === 'Talent Manager' ? allData.beschikbaarheid : filterItems(allData.beschikbaarheid, 'TalentManagerID');
document.getElementById('count-beschikbaarheid').textContent = items.length;
if (!items.length) { body.innerHTML = '<div class="empty">Geen beschikbare medewerkers.</div>'; return; }

// Sorteren
if (beschikbaarheidSort.col) {
items = [...items].sort((a, b) => {
let va = '', vb = '';
if (beschikbaarheidSort.col === 'medewerker') { va = a.Medewerker || ''; vb = b.Medewerker || ''; }
else if (beschikbaarheidSort.col === 'status') { va = a.Status || ''; vb = b.Status || ''; }
else if (beschikbaarheidSort.col === 'tm') { va = a.TalentManager || ''; vb = b.TalentManager || ''; }
else if (beschikbaarheidSort.col === 'aanvraag') { va = telStatus(a.MatchesJSON, ['1055']); vb = telStatus(b.MatchesJSON, ['1055']); }
else if (beschikbaarheidSort.col === 'lead') { va = telStatus(a.MatchesJSON, ['29']); vb = telStatus(b.MatchesJSON, ['29']); }
else if (beschikbaarheidSort.col === 'netwerk') { va = telStatus(a.MatchesJSON, ['6']); vb = telStatus(b.MatchesJSON, ['6']); }
else if (beschikbaarheidSort.col === 'gesprek') { va = telStatus(a.MatchesJSON, ['7','8']); vb = telStatus(b.MatchesJSON, ['7','8']); }
return va < vb ? -beschikbaarheidSort.dir : va > vb ? beschikbaarheidSort.dir : 0;
});
}

const si = (col) => beschikbaarheidSort.col !== col ? ' <span style="opacity:0.3">↕</span>' : beschikbaarheidSort.dir === 1 ? ' <span style="color:var(--accent)">↑</span>' : ' <span style="color:var(--accent)">↓</span>';
const th = 'cursor:pointer;user-select:none;';
body.innerHTML = '<div class="table-wrap"><table><thead><tr>' +
'<th style="' + th + '" onclick="sortBeschikbaarheid(\'medewerker\')">Medewerker' + si('medewerker') + '</th>' +
'<th style="' + th + '" onclick="sortBeschikbaarheid(\'status\')">Status' + si('status') + '</th>' +
'<th style="' + th + '" onclick="sortBeschikbaarheid(\'tm\')">Talent Manager' + si('tm') + '</th>' +
'<th style="' + th + '" onclick="sortBeschikbaarheid(\'aanvraag\')" title="3.3 Voorstel op aanvraag">📄 Aanvraag' + si('aanvraag') + '</th>' +
'<th style="' + th + '" onclick="sortBeschikbaarheid(\'lead\')" title="3.1 Voorstel op lead">📄 Lead' + si('lead') + '</th>' +
'<th style="' + th + '" onclick="sortBeschikbaarheid(\'netwerk\')" title="3.2 Voorstel netwerk">📄 Netwerk' + si('netwerk') + '</th>' +
'<th style="' + th + '" onclick="sortBeschikbaarheid(\'gesprek\')">🗓 Gesprekken' + si('gesprek') + '</th>' +
'</tr></thead><tbody>' +
items.map(m => {
const matches = parseJSON(m.MatchesJSON);
const pip = getBeschikbaarheidPipeline(matches);
const geenActief = pip.aanvraag.length === 0 && pip.lead.length === 0 && pip.netwerk.length === 0 && pip.gesprek.length === 0;
const isBeschikbaar = (m.Status||'').includes('beschikbaar') && !(m.Status||'').includes('binnenkort');
return '<tr class="' + (geenActief ? 'geen-voorstellen' : '') + '">' +
'<td><strong>' + (geenActief ? '<span class="alert-dot"></span>' : '') + esc(m.Medewerker) + '</strong></td>' +
'<td><span class="status-badge ' + (isBeschikbaar ? 'status-beschikbaar' : 'status-binnenkort') + '">' + esc(m.Status) + '</span></td>' +
'<td>' + esc(m.TalentManager) + '</td>' +
'<td>' + pipBtn('v', pip.aanvraag.length, 'Voorstel aanvraag — ' + m.Medewerker, pip.aanvraag) + '</td>' +
'<td>' + pipBtn('v', pip.lead.length, 'Voorstel lead — ' + m.Medewerker, pip.lead) + '</td>' +
'<td>' + pipBtn('v', pip.netwerk.length, 'Voorstel netwerk — ' + m.Medewerker, pip.netwerk) + '</td>' +
'<td>' + pipBtn('g', pip.gesprek.length, 'Gesprekken — ' + m.Medewerker, pip.gesprek) + '</td>' +
'</tr>';
}).join('') + '</tbody></table></div>';
}

// ─── AFSPRAKEN / MEETINGS ───────────────────────────────────────────────────────
// Start is opgeslagen als 'dd.mm.jjjj' tekst -> terug naar Date voor sorteren/filteren.
function parseNL(d) {
if (!d) return null;
const m = String(d).match(/^(\d{2})\.(\d{2})\.(\d{4})$/);
if (m) return new Date(+m[3], +m[2]-1, +m[1]);
const dt = new Date(d); return isNaN(dt) ? null : dt;
}
// Robuuste rolbepaling voor afspraken: eerst op CarerixID (OwnerID), anders op naam
// (Owner), telkens tegen de geverifieerde gebruikerslijst. Zo glipt niemand door als
// de OwnerID ontbreekt of een rol verkeerd gesynct is. Onbekend -> null (= buiten de witte lijst).
function meetingOwnerRol(m) {
const id = String(m.OwnerID || '').trim();
if (id && GEBRUIKERS_MAP[id]) return normaliseerRol(GEBRUIKERS_MAP[id].rol);
const naam = (m.Owner || '').toLowerCase().trim();
if (naam) {
for (const k in GEBRUIKERS_MAP) { if (GEBRUIKERS_MAP[k].naam.toLowerCase() === naam) return normaliseerRol(GEBRUIKERS_MAP[k].rol); }
for (const k in GEBRUIKERS_MAP) { const ln = GEBRUIKERS_MAP[k].naam.toLowerCase().split(' ').pop(); if (ln && naam.indexOf(ln) !== -1) return normaliseerRol(GEBRUIKERS_MAP[k].rol); }
}
const u = userMap[id];
if (u && isGranulareRol(u.rol)) return normaliseerRol(u.rol);
return null;
}
function setMeetingsView(v) {
meetingsView = v;
if (v === 'afgelopen' && meetingsPeriod === 'kwartaal') meetingsPeriod = 'maand';
meetingsSort = { key: null, dir: null };
renderMeetings();
}
function setMeetingsPeriod(p) { meetingsPeriod = p; renderMeetings(); }
function setMeetingsSort(k) {
if (meetingsSort.key === k) meetingsSort.dir = meetingsSort.dir === 'asc' ? 'desc' : 'asc';
else { meetingsSort.key = k; meetingsSort.dir = 'asc'; }
renderMeetings();
}
function toggleMeetingsType(i) {
const t = meetingsTypeOpts[i];
if (t === undefined) return;
const j = meetingsTypes.indexOf(t);
if (j >= 0) meetingsTypes.splice(j, 1); else meetingsTypes.push(t);
renderMeetings();
}
function clearMeetingsTypes() { meetingsTypes = []; renderMeetings(); }

function renderMeetings() {
const body = document.getElementById('body-meetings');
// Rol/vestiging-filter; daarna ALLEEN Business Managers en Recruitment Consultants (witte lijst).
const base = filterItems(allData.meetings, 'OwnerID')
.filter(m => { const r = meetingOwnerRol(m); return r === 'Business Manager' || r === 'Recruiter'; })
.filter(m => MEETING_TYPES.includes((m.TypeAfspraak||'').trim()));

// Vaste type-knoppen (alleen de relevante afspraaktypes); stale selecties opschonen.
meetingsTypeOpts = MEETING_TYPES.slice();
meetingsTypes = meetingsTypes.filter(t => meetingsTypeOpts.includes(t));

// Type-filter toepassen (leeg = alle).
const items = meetingsTypes.length
? base.filter(m => meetingsTypes.includes((m.TypeAfspraak||'').trim()))
: base;

const vandaag = new Date(); vandaag.setHours(0,0,0,0);
const metDatum = items.map(m => ({ m, d: parseNL(m.Start) })).filter(x => x.d);

const dagen = meetingsPeriod === 'week' ? 7 : meetingsPeriod === 'kwartaal' ? 92 : 31;
let rows;
if (meetingsView === 'komende') {
const grens = new Date(vandaag); grens.setDate(grens.getDate() + dagen);
rows = metDatum.filter(x => x.d >= vandaag && x.d <= grens);
} else {
const grens = new Date(vandaag); grens.setDate(grens.getDate() - dagen);
rows = metDatum.filter(x => x.d < vandaag && x.d >= grens);
}

// Sortering: standaard op datum (komende oplopend, afgelopen aflopend); anders op gekozen kolom.
let sKey = meetingsSort.key, sDir = meetingsSort.dir;
if (!sKey) { sKey = 'datum'; sDir = (meetingsView === 'komende') ? 'asc' : 'desc'; }
const sv = (x) => {
switch (sKey) {
case 'type': return (x.m.TypeAfspraak||'').toLowerCase();
case 'resultaat': return (x.m.Resultaat||'').toLowerCase();
case 'contact': return (x.m.Contactpersoon||'').toLowerCase();
case 'bedrijf': return (x.m.Bedrijf||'').toLowerCase();
case 'consultant': return (x.m.Owner||'').toLowerCase();
default: return x.d.getTime();
}
};
const dir = sDir === 'desc' ? -1 : 1;
rows.sort((a,b) => { const va = sv(a), vb = sv(b); return va < vb ? -dir : va > vb ? dir : 0; });

document.getElementById('count-meetings').textContent = rows.length;

// Balk 1: weergave-toggle + periodeknoppen
const perioden = meetingsView === 'komende' ? ['week','maand','kwartaal'] : ['week','maand'];
const labelP = { week:'Week', maand:'Maand', kwartaal:'Kwartaal' };
const tab = (active, on, label) => '<button class="mtab' + (active ? ' active' : '') + '" onclick="' + on + '">' + label + '</button>';
const bar = '<div class="mbar"><div class="mbar-group">' +
tab(meetingsView==='komende', "setMeetingsView('komende')", 'Komende') +
tab(meetingsView==='afgelopen', "setMeetingsView('afgelopen')", 'Afgelopen') +
'</div><div class="mbar-sep"></div><div class="mbar-group">' +
perioden.map(p => tab(meetingsPeriod===p, "setMeetingsPeriod('" + p + "')", labelP[p])).join('') +
'</div></div>';

// Balk 2: type-filter (alleen tonen als er types in de data zijn)
const typeBar = meetingsTypeOpts.length
? '<div class="mbar"><span style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-right:2px">Type</span>' +
'<button class="mtab' + (!meetingsTypes.length ? ' active' : '') + '" onclick="clearMeetingsTypes()">Alle</button>' +
meetingsTypeOpts.map((t,i) => '<button class="mtab' + (meetingsTypes.includes(t) ? ' active' : '') + '" onclick="toggleMeetingsType(' + i + ')">' + esc(t) + '</button>').join('') +
'</div>'
: '';
const toolbar = bar + typeBar;

if (!rows.length) { body.innerHTML = toolbar + '<div class="empty">Geen afspraken in deze periode.</div>'; return; }

const toonResultaat = meetingsView === 'afgelopen';
const mut = '<span style="color:var(--muted)">—</span>';
const pijl = (k) => sKey === k ? '<span style="opacity:.65">' + (sDir === 'desc' ? ' ↓' : ' ↑') + '</span>' : '';
const th = (k, label) => '<th onclick="setMeetingsSort(\'' + k + '\')" style="cursor:pointer;user-select:none">' + label + pijl(k) + '</th>';
const head = '<tr>' + th('datum','Datum') + th('type','Type') +
(toonResultaat ? th('resultaat','Resultaat') : '') +
th('contact','Contactpersoon') + th('bedrijf','Bedrijf') + th('consultant','Consultant') + '</tr>';
const trs = rows.map(({m}) => {
const type = (m.TypeAfspraak||'').trim();
const res = (m.Resultaat||'').trim();
const cp = (m.Contactpersoon||'').trim();
const bd = (m.Bedrijf||'').trim();
return '<tr>' +
'<td style="font-family:\'DM Mono\',monospace;font-size:12px;white-space:nowrap">' + esc(m.Start) + '</td>' +
'<td>' + (type ? '<span class="status-badge mtype">' + esc(type) + '</span>' : mut) + '</td>' +
(toonResultaat ? '<td>' + (res ? '<span class="status-badge mres">' + esc(res) + '</span>' : mut) + '</td>' : '') +
'<td>' + (cp ? esc(cp) : mut) + '</td>' +
'<td>' + (bd ? esc(bd) : mut) + '</td>' +
'<td>' + esc(m.Owner) + '</td>' +
'</tr>';
}).join('');
body.innerHTML = toolbar + '<div class="table-wrap"><table><thead>' + head + '</thead><tbody>' + trs + '</tbody></table></div>';
}

// ─── AUTO LOGIN ───────────────────────────────────────────────────────────────
(async () => {
await msalInstance.initialize();
try {
const resp = await msalInstance.handleRedirectPromise();
if (resp && resp.account) {
msalInstance.setActiveAccount(resp.account);
await initApp(resp.account);
return;
}
} catch(e) {
console.error('Redirect error:', e);
}
const accounts = msalInstance.getAllAccounts();
if (accounts.length > 0) {
msalInstance.setActiveAccount(accounts[0]);
await initApp(accounts[0]);
}
})();
</script>
